
version: 2

models:
  - name: account
    description: "One to One mapping of account table"
    columns:
      - name: account_id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null

  - name: card
    description: "One to One mapping of card table"
    columns:
      - name: card_id
        description: "The primary key for this table"
  
  - name: client
    description: "One to One mapping of client table"
    columns:
      - name: client_id
        description: "The primary key for this table"
  
  - name: disposition
    description: "One to One mapping of disp table"
    columns:
      - name: disp_id
        description: "The primary key for this table"

  - name: district
    description: "One to One mapping of district table"
