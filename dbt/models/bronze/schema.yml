      - name: A1
        description: "The primary key for this table"

  - name: loan
    description: "One to One mapping of loan table"
    columns:
      - name: loan_id
        description: "The primary key for this table"
  
  - name: order
    description: "One to One mapping of order table"
    columns:
      - name: order_id
        description: "The primary key for this table"

  - name: transactions
    description: "One to One mapping of transactions table"
    columns:
